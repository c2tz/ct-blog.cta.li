name: Update Konachan backgrounds

on:
  schedule:
   - cron: "0 20 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-konachan-backgrounds
  cancel-in-progress: false

jobs:
  update-backgrounds:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout develop
        uses: actions/checkout@v7
        with:
          ref: develop

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.3
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh backgrounds
        run: pnpm update:konachan

      - name: Validate generated assets
        run: |
          node --input-type=module <<'EOF'
          import { readFile, readdir } from "node:fs/promises";

          const manifest = JSON.parse(
            await readFile("public/konachan-backgrounds.json", "utf8"),
          );
          const files = (await readdir("public/konachan-backgrounds")).filter((file) =>
            file.endsWith(".webp"),
          );
          const expectedRatings = { safe: 10, questionable: 10, explicit: 10 };
          const expectedFiles = new Set();
          const ratings = {};

          for (const image of manifest.images ?? []) {
            const rating = image.rating ?? "safe";
            ratings[rating] = (ratings[rating] ?? 0) + 1;
            if (image.url) expectedFiles.add(image.url.split("/").pop());
            for (const variant of image.variants ?? []) {
              if (variant.url) expectedFiles.add(variant.url.split("/").pop());
            }
          }

          for (const [rating, expected] of Object.entries(expectedRatings)) {
            if (ratings[rating] !== expected) {
              throw new Error(
                `Expected ${expected} ${rating} images, got ${ratings[rating] ?? 0}.`,
              );
            }
          }

          if (!Array.isArray(manifest.images) || manifest.images.length !== 30) {
            throw new Error(
              `The Konachan manifest should contain exactly 30 images, got ${manifest.images?.length ?? 0}.`,
            );
          }

          if (files.length !== expectedFiles.size) {
            throw new Error(
              `Manifest/files mismatch: ${expectedFiles.size}/${files.length}`,
            );
          }

          console.log(`Validated ${manifest.images.length} Konachan backgrounds and ${files.length} files.`);
          EOF

      - name: Commit updated backgrounds
        run: |
          if git diff --quiet -- public/konachan-backgrounds public/konachan-backgrounds.json; then
            echo "Konachan backgrounds are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/konachan-backgrounds public/konachan-backgrounds.json
          git commit -m "chore: refresh Konachan backgrounds"
          git pull --rebase origin develop
          git push origin HEAD:develop
