name: Update security header hashes

on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - ".github/workflows/update-security-headers.yml"
      - "astro.config.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "public/**"
      - "scripts/check-security-headers.mjs"
      - "scripts/sync-security-header-hashes.mjs"
      - "src/**"
      - "vercel.json"

permissions:
  contents: write

concurrency:
  group: update-security-headers-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update-hashes:
    name: update hashes
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.3
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static output
        run: pnpm build

      - name: Sync security header hashes
        run: pnpm sync:headers

      - name: Validate security headers
        run: pnpm check:headers

      - name: Commit updated header hashes
        run: |
          if git diff --quiet -- vercel.json; then
            echo "Security header hashes are already committed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vercel.json
          git commit -m "chore(ci): update security header hashes"
          git push
